<style>

<script>
(function(){
'use strict';

// 配置
const BASE = 'https://www.ht10010.com';
const CATS = [
  ['首页', '/'],
  ['电视剧', '/type/2.html'],
  ['电影', '/type/1.html'],
  ['动漫', '/type/4.html'],
  ['综艺', '/type/3.html'],
  ['短剧', '/type/5.html'],
  ['腾讯', '/label/qq.html'],
  ['优酷', '/label/youku.html'],
  ['B站', '/label/bli.html']
];
const UA = 'Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36 Chrome/120 Mobile Safari/537.36';
let fmReady = false;
let currentUrl = BASE + '/';
let lastFocus = null;

const $ = s => document.querySelector(s);
const content = $('#content');
const statusEl = $('#status');
const tabsDiv = $('#tabs');

// SDK 检测
function markNative() {
  if (window.fongmiBridge || window.fm || window.fongmi) 
    document.documentElement.classList.add('fm-native');
}
function waitFm(ms = 1600) {
  markNative();
  if (window.fm) {
    fmReady = true;
    return Promise.resolve(window.fm);
  }
  return new Promise(resolve => {
    let done = false;
    const ok = () => {
      if (done) return;
      done = true;
      markNative();
      fmReady = !!window.fm;
      resolve(window.fm || null);
    };
    window.addEventListener('fmsdk', ok, { once: true });
    setTimeout(ok, ms);
  });
}

// 工具函数
function abs(url) {
  if (!url) return '';
  try { return new URL(url, BASE + '/').href; } catch(e) { return url; }
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/[&<>'"]/g, c => {
    if (c === '&') return '&amp;';
    if (c === '<') return '&lt;';
    if (c === '>') return '&gt;';
    if (c === "'") return '&#39;';
    if (c === '"') return '&quot;';
    return c;
  });
}
function clean(s) {
  return String(s || '').replace(/\s+/g, ' ').replace(/[\uE000-\uF8FF]/g, '').trim();
}
function imgUrl(u) {
  u = abs(u);
  if (!u) return '';
  try {
    if (window.fm && fm.res) return fm.res(u, { headers: { Referer: BASE + '/' } });
  } catch(e) {}
  return u;
}

// 网络请求 (优先 fm.req)
async function reqText(url, options = {}) {
  url = abs(url);
  statusEl.textContent = '加载：' + url;
  try {
    if (window.fm && fm.req) {
      const resp = await fm.req(url, {
        method: options.method || 'GET',
        headers: Object.assign({ 'User-Agent': UA, 'Referer': BASE + '/' }, options.headers || {}),
        responseType: 'text',
        timeout: options.timeout || 25,
        credentials: 'include',
        body: options.body
      });
      if (!resp.ok && resp.status !== 200) 
        throw new Error(resp.error || ('HTTP ' + resp.status));
      return resp.body || resp.content || resp.data || resp.text || '';
    }
    const fetchOpts = {
      headers: Object.assign({ 'Referer': BASE + '/' }, options.headers || {})
    };
    if (options.method === 'POST') {
      fetchOpts.method = 'POST';
      fetchOpts.body = options.body;
    }
    const r = await fetch(url, fetchOpts);
    return await r.text();
  } catch(e) {
    statusEl.textContent = '加载失败：' + e.message;
    throw e;
  }
}

// ================= 新增：至臻4K破解核心 =================
// 辅助：MD5（使用 CryptoJS）
function md5(str) {
  return CryptoJS.MD5(str).toString();
}
// 解密1：XOR + base64 (对应 Python js_decrypt1)
function jsDecrypt1(data) {
  try {
    const key = md5('test');  // '098f6bcd4621d373cade4e832627b4f6'
    const decoded = atob(data);
    let result = '';
    for (let i = 0; i < decoded.length; i++) {
      result += String.fromCharCode(decoded.charCodeAt(i) ^ key.charCodeAt(i % key.length));
    }
    return atob(result);
  } catch(e) { return data; }
}
// 解密2：字符映射表 (对应 Python js_decrypt2)
function jsDecrypt2(data) {
  const staticchars = "PXhw7UT1B0a9kQDKZsjIASmOezxYG4CHo5Jyfg2b8FLpEvRr3WtVnlqMidu6cN";
  try {
    const dec = atob(data);
    let out = '';
    for (let i = 1; i < dec.length; i += 3) {
      const ch = dec[i];
      const idx = staticchars.indexOf(ch);
      if (idx !== -1) {
        out += staticchars[(idx + 59) % 62];
      } else {
        out += ch;
      }
    }
    return out;
  } catch(e) { return data; }
}
// 解密3：分片 base64 映射 (对应 Python js_decrypt3)
function jsDecrypt3(data) {
  function fixB64(s) {
    let missing = s.length % 4;
    if (missing) s += '='.repeat(4 - missing);
    return s;
  }
  try {
    const parts = data.split('/');
    if (parts.length >= 3) {
      const arr1 = JSON.parse(atob(fixB64(parts[0])));
      const arr2 = JSON.parse(atob(fixB64(parts[1])));
      const cipher = atob(fixB64(parts.slice(2).join('/')));
      let result = '';
      for (let i = 0; i < cipher.length; i++) {
        const c = cipher[i];
        const idx = arr2.indexOf(c);
        if (idx !== -1) result += arr1[idx];
        else result += c;
      }
      return result;
    }
  } catch(e) {}
  return data;
}

// 主破解函数：给定播放页 URL，返回最终真实视频地址
async function crackPlayUrl(playPageUrl) {
  try {
    // 1. 获取播放页 HTML
    let html = await reqText(playPageUrl);
    // 2. 提取 player_aaaa 对象
    let match = html.match(/var\s+player_aaaa\s*=\s*(\{[\s\S]*?\})\s*<\/script>/);
    if (!match) return null;
    let playerData;
    try {
      playerData = JSON.parse(match[1]);
    } catch(e) { return null; }
    let durl = playerData.url || '';
    let encrypt = playerData.encrypt || 0;
    // 3. 根据 encrypt 解码
    if (encrypt == 1) {
      durl = decodeURIComponent(durl);
    } else if (encrypt == 2) {
      durl = decodeURIComponent(atob(durl));
    }
    // 4. 如果已经是直链则返回
    if (durl.startsWith('http') && (durl.includes('.m3u8') || durl.includes('.mp4'))) {
      return durl;
    }
    // 5. 获取 playerconfig.js 中的解析 API
    let configUrl = BASE + '/static/js/playerconfig.js';
    let configJs = await reqText(configUrl);
    let parseApi = '';
    let fromFlag = playerData.from || '';
    if (fromFlag) {
      let re = new RegExp(`"${fromFlag}":\\{[^}]*"parse":"([^"]+)"`);
      let m = configJs.match(re);
      if (m) parseApi = m[1].replace(/\\\//g, '/');
    }
    if (!parseApi) {
      let m = configJs.match(/"parse":"(http[^"]+)"/);
      if (m) parseApi = m[1].replace(/\\\//g, '/');
    }
    if (!parseApi) parseApi = 'https://fgsrg.hzqingshan.com/player/?url=';
    // 6. 请求 iframe 页面
    let iframeUrl = parseApi + encodeURIComponent(durl);
    let iframeHtml = await reqText(iframeUrl, { headers: { Referer: playPageUrl } });
    // 7. 解析 iframe 中的 #player-data
    let tempDiv = document.createElement('div');
    tempDiv.innerHTML = iframeHtml;
    let playerDataEl = tempDiv.querySelector('#player-data');
    if (!playerDataEl) return iframeUrl;  // 无法解析则返回 iframe 地址让 app 自己处理
    let token = playerDataEl.getAttribute('data-te') || '';
    let bt = playerDataEl.getAttribute('data-bt') || '/player/';
    // 8. 构造 API 请求
    let apiBase = new URL(parseApi);
    let apiHost = apiBase.origin;
    let apiUrl = apiHost + bt + 'mplayer.php';
    let postData = `url=${encodeURIComponent(durl)}&token=${encodeURIComponent(token)}`;
    let apiResText = await reqText(apiUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
        'X-Requested-With': 'XMLHttpRequest',
        'Referer': iframeUrl,
        'Origin': apiHost
      },
      body: postData
    });
    let apiJson = JSON.parse(apiResText);
    let realUrl = apiJson.url || (apiJson.data && apiJson.data.url) || '';
    let urlmode = String(apiJson.urlmode || (apiJson.data && apiJson.data.urlmode) || '');
    // 9. 根据 urlmode 解密
    if (urlmode === '1') realUrl = jsDecrypt1(realUrl);
    else if (urlmode === '2') realUrl = jsDecrypt2(realUrl);
    else if (urlmode === '3') realUrl = jsDecrypt3(realUrl);
    // 10. 多重解密（某些线路套娃）
    for (let i = 0; i < 3; i++) {
      if (realUrl.startsWith('WyJ') && realUrl.includes('/')) {
        realUrl = jsDecrypt3(realUrl);
      } else break;
    }
    if (realUrl && (realUrl.includes('.m3u8') || realUrl.includes('.mp4'))) {
      return realUrl;
    }
    return null;
  } catch(e) {
    console.error('破解失败', e);
    return null;
  }
}

// 播放入口：先尝试破解，失败则回退原逻辑
async function playEpisode(url, title) {
  statusEl.textContent = '正在破解至臻4K地址…';
  let realUrl = await crackPlayUrl(url);
  if (!realUrl) {
    // 回退到旧的简易嗅探
    statusEl.textContent = '破解失败，尝试普通嗅探…';
    realUrl = await fetchRealPlayUrl(url);
  }
  if (!realUrl) {
    statusEl.textContent = '未提取到播放地址，将打开原页面';
    realUrl = url;
  }
  if (window.fm && fm.play) {
    fm.play(realUrl, title, { referer: BASE });
    statusEl.textContent = '已发送播放：' + title;
  } else {
    location.href = realUrl;
  }
}

// 保留原有的简单嗅探作为 fallback
async function fetchRealPlayUrl(playPageUrl) {
  try {
    let html = await reqText(playPageUrl);
    let videoMatch = html.match(/<video[^>]+src="([^"]+)"/i);
    if (videoMatch) return videoMatch[1];
    let iframeMatch = html.match(/<iframe[^>]+src="([^"]+)"/i);
    if (iframeMatch) return iframeMatch[1];
    let m3u8Match = html.match(/https?:\/\/[^\s"'<>]+\.m3u8[^\s"'<>]*/i);
    if (m3u8Match) return m3u8Match[0];
    let mp4Match = html.match(/https?:\/\/[^\s"'<>]+\.mp4[^\s"'<>]*/i);
    if (mp4Match) return mp4Match[0];
    return null;
  } catch(e) { return null; }
}

// ================= 以下为 UI 渲染、列表/详情解析（与原版相同，略作调整） =================
function parseList(html, keyword = '') {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const links = Array.from(doc.querySelectorAll('a[href*="/detail/"]'));
  const itemMap = new Map();
  for (let a of links) {
    let href = abs(a.getAttribute('href'));
    if (!href || itemMap.has(href)) continue;
    let img = a.querySelector('img');
    let image = img ? (img.getAttribute('data-src') || img.getAttribute('data-original') || img.getAttribute('src') || '') : '';
    let title = a.getAttribute('title') || (img ? img.getAttribute('alt') : '') || '';
    if (!title) title = clean(a.textContent).replace(/^(4K|今日更新|更新至|已完结|HD|全|第.*集)/, '').slice(0, 40);
    if (!title) title = '未命名';
    let remark = '';
    let parent = a.closest('.item, .module-item, .video-item, .vod-item, li, div');
    if (parent) {
      let remarkEl = parent.querySelector('.remark, .sub, .ep, .updata, .score');
      if (remarkEl) remark = clean(remarkEl.textContent).slice(0, 30);
    }
    itemMap.set(href, { href, title: clean(title), remark, image: abs(image) });
  }
  let items = Array.from(itemMap.values()).slice(0, 60);
  let sections = [];
  if (keyword) {
    sections.push({ title: '搜索：' + keyword, items });
  } else {
    const modules = doc.querySelectorAll('.module, .box, .layout-box, .section');
    for (let mod of modules) {
      let titleEl = mod.querySelector('.module-title, .title, h2, h3');
      let modTitle = titleEl ? clean(titleEl.textContent).replace(/更多$/, '') : '';
      if (!modTitle || /热门搜索|播放记录|公告/.test(modTitle)) continue;
      let modItems = [];
      let modLinks = mod.querySelectorAll('a[href*="/detail/"]');
      for (let a of modLinks) {
        let href = abs(a.getAttribute('href'));
        let img = a.querySelector('img');
        let image = img ? (img.getAttribute('data-src') || img.getAttribute('src')) : '';
        let title = a.getAttribute('title') || (img ? img.getAttribute('alt') : '') || '';
        if (!title) title = clean(a.textContent);
        modItems.push({ href, title: clean(title), remark: '', image: abs(image) });
        if (modItems.length >= 20) break;
      }
      if (modItems.length >= 3) sections.push({ title: modTitle, items: modItems.slice(0, 20) });
    }
    if (sections.length === 0 && items.length) sections.push({ title: '影片列表', items });
  }
  return sections;
}

function parseDetail(html, url) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  let h1 = doc.querySelector('h1');
  let title = h1 ? clean(h1.textContent) : clean(doc.title.replace(/《|》|免费观看.*$/, ''));
  let pic = doc.querySelector('.detail-pic img, .vod-pic img, .poster img, .cover img, img[alt*="海报"]');
  let image = pic ? (pic.getAttribute('data-src') || pic.getAttribute('src')) : '';
  let descElem = doc.querySelector('.desc, .info, .abstract, .vod-content, .detail-content');
  let desc = descElem ? clean(descElem.textContent) : '';
  if (!desc) {
    let bodyText = doc.body.innerText;
    let match = bodyText.match(/简介[：:]\s*([\s\S]*?)(?:播放|线路|演员|导演|$)/i);
    if (match) desc = clean(match[1]);
  }
  if (!desc) desc = '暂无简介';
  if (desc.length > 360) desc = desc.slice(0, 360) + '…';
  // 提取详细信息
  let infoLines = [];
  const infoMap = { '类型': '', '导演': '', '演员': '', '年代': '', '地区': '', '更新': '' };
  let infoEl = doc.querySelector('.info, .detail-info, .vod-info, .info-list');
  if (infoEl) {
    let text = infoEl.innerText;
    for (let key of Object.keys(infoMap)) {
      let reg = new RegExp(key + '[：:]\\s*([^\\n\\r]+)', 'i');
      let match = text.match(reg);
      if (match) infoMap[key] = clean(match[1]);
    }
  }
  for (let [k, v] of Object.entries(infoMap)) if (v) infoLines.push([k, v]);
  // 线路和剧集
  let lines = [];
  let tabDivs = doc.querySelectorAll('.anthology-tab, .module-tab, .play-tab, .tab-list');
  let listDivs = doc.querySelectorAll('.anthology-list-box, .play-list, .module-list, .episode-list');
  if (tabDivs.length && listDivs.length) {
    let tabs = Array.from(tabDivs[0].querySelectorAll('a, span, .tab'));
    let lists = Array.from(listDivs);
    for (let i = 0; i < tabs.length && i < lists.length; i++) {
      let name = clean(tabs[i].textContent).replace(/\(\d+\)/, '');
      let eps = [];
      let epLinks = lists[i].querySelectorAll('a[href*="/play/"]');
      for (let a of epLinks) {
        let href = abs(a.getAttribute('href'));
        let epTitle = clean(a.textContent) || '播放';
        eps.push({ href, title: epTitle });
      }
      if (eps.length) lines.push({ sid: String(i+1), name: name || ('线路'+(i+1)), eps });
    }
  }
  if (lines.length === 0) {
    let allPlayLinks = doc.querySelectorAll('a[href*="/play/"]');
    let groups = new Map();
    for (let a of allPlayLinks) {
      let href = abs(a.getAttribute('href'));
      let match = href.match(/\/play\/(\d+)-(\d+)-(\d+)\.html/);
      if (match) {
        let sid = match[2];
        if (!groups.has(sid)) groups.set(sid, []);
        groups.get(sid).push({ href, title: clean(a.textContent) || '第'+match[3]+'集' });
      } else {
        if (!groups.has('1')) groups.set('1', []);
        groups.get('1').push({ href, title: clean(a.textContent) || '播放' });
      }
    }
    let idx = 1;
    for (let [sid, eps] of groups.entries()) {
      lines.push({ sid, name: '线路'+idx, eps });
      idx++;
    }
  }
  for (let line of lines) {
    line.eps.sort((a,b) => (parseInt(a.title.match(/\d+/)||0) - parseInt(b.title.match(/\d+/)||0)));
  }
  return { title, image: abs(image), fields: infoLines, desc, lines, url };
}

// UI 渲染函数
function renderTabs(activeUrl) {
  tabsDiv.innerHTML = CATS.map(([name, path]) => {
    let url = abs(path);
    let active = (url === activeUrl) ? 'active' : '';
    return `<button class="tab focusable ${active}" data-url="${esc(url)}">${esc(name)}</button>`;
  }).join('');
  Array.from(tabsDiv.querySelectorAll('.tab')).forEach(btn => btn.onclick = () => loadPage(btn.dataset.url));
}
function renderSections(sections) {
  if (!sections.length) { content.innerHTML = '<div class="empty">暂无内容</div>'; return; }
  content.innerHTML = sections.map(sec => `
    <section class="section">
      <div class="section-title"><h2>${esc(sec.title)}</h2></div>
      <div class="grid">
        ${sec.items.map(it => `
          <article class="card focusable" tabindex="0" data-href="${esc(it.href)}">
            <div class="poster">
              ${it.image ? `<img loading="lazy" referrerpolicy="no-referrer" src="${esc(imgUrl(it.image))}" alt="${esc(it.title)}">` : '<div class="noimg">枫</div>'}
            </div>
            <div class="meta">
              <div class="name">${esc(it.title)}</div>
              <div class="remark">${esc(it.remark || '点击查看详情')}</div>
            </div>
          </article>
        `).join('')}
      </div>
    </section>
  `).join('');
  Array.from(content.querySelectorAll('.card')).forEach(card => card.onclick = () => openDetail(card.dataset.href));
}
async function loadPage(url) {
  currentUrl = abs(url);
  renderTabs(currentUrl);
  content.innerHTML = '<div class="empty loading">正在加载内容…</div>';
  try {
    const html = await reqText(currentUrl);
    const sections = parseList(html);
    renderSections(sections);
    let total = sections.reduce((s, sec) => s + sec.items.length, 0);
    statusEl.textContent = `已加载 ${total} 条内容`;
    restoreFocus();
  } catch(e) {
    content.innerHTML = `<div class="empty">加载失败：${esc(e.message)}</div>`;
  }
}
async function search(q) {
  q = clean(q); if (!q) return;
  history.pushState({ route: 'search', q }, '', '#search=' + encodeURIComponent(q));
  renderTabs('');
  content.innerHTML = '<div class="empty loading">搜索中…</div>';
  let searchUrls = [
    BASE + '/search?wd=' + encodeURIComponent(q),
    BASE + '/index.php?m=vod-search&wd=' + encodeURIComponent(q),
    BASE + '/cupfox-search/-------------.html?wd=' + encodeURIComponent(q)
  ];
  let html = null;
  for (let su of searchUrls) {
    try { html = await reqText(su); if (html && (html.includes('/detail/') || html.includes('class="grid"'))) break; } catch(e) {}
  }
  if (!html) { content.innerHTML = '<div class="empty">搜索失败，请换关键词或检查网络</div>'; return; }
  let sections = parseList(html, q);
  if (!sections.length || !sections[0].items.length) {
    content.innerHTML = '<div class="empty">没有找到相关结果</div>';
    statusEl.textContent = '无搜索结果：' + q;
    return;
  }
  renderSections(sections);
  statusEl.textContent = '搜索完成：' + q;
}
async function openDetail(url) {
  lastFocus = document.activeElement;
  document.body.classList.add('detail-active');
  $('#detailSheet').classList.add('active');
  $('#detailPanel').innerHTML = '<div class="empty loading">正在读取详情…</div>';
  history.pushState({ route: 'detail', url }, '', '#detail=' + encodeURIComponent(url));
  try {
    const html = await reqText(url);
    const detail = parseDetail(html, url);
    let fieldsHtml = detail.fields.map(f => `<div><b>${esc(f[0])}</b>：${esc(f[1])}</div>`).join('');
    let lineTabsHtml = detail.lines.map((ln, idx) => `<button class="line-tab focusable ${idx===0?'active':''}" data-sid="${esc(ln.sid)}">${esc(ln.name)}(${ln.eps.length})</button>`).join('');
    let panelHtml = `
      <button class="focusable" id="closeDetail">返回</button>
      <div class="detail-head">
        <img class="detail-pic" referrerpolicy="no-referrer" src="${esc(imgUrl(detail.image))}" onerror="this.style.display='none'">
        <div>
          <div class="detail-title">${esc(detail.title)}</div>
          <div class="detail-info">${fieldsHtml || '枫叶影院资源'}</div>
          <p class="desc">${esc(detail.desc)}</p>
        </div>
      </div>
      <h3>播放线路</h3>
      <div class="line-tabs">${lineTabsHtml}</div>
      <div class="episodes" id="episodeBox"></div>
    `;
    $('#detailPanel').innerHTML = panelHtml;
    $('#closeDetail').onclick = closeDetail;
    function renderLine(sid) {
      let line = detail.lines.find(l => l.sid == sid) || detail.lines[0];
      if (!line) return;
      let epHtml = line.eps.map(ep => `<button class="ep focusable" data-href="${esc(ep.href)}">${esc(ep.title)}</button>`).join('');
      $('#episodeBox').innerHTML = epHtml || '<div class="empty">暂无剧集</div>';
      Array.from($('#episodeBox').querySelectorAll('.ep')).forEach(btn => {
        btn.onclick = () => playEpisode(btn.dataset.href, detail.title + ' ' + btn.textContent);
      });
      let firstEp = $('#episodeBox').querySelector('.ep');
      if (firstEp) firstEp.focus({ preventScroll: true });
    }
    let lineTabs = $('#detailPanel').querySelectorAll('.line-tab');
    lineTabs.forEach(tab => {
      tab.onclick = () => {
        lineTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderLine(tab.dataset.sid);
      };
    });
    renderLine(detail.lines[0]?.sid || '1');
    setTimeout(() => { let firstEp = $('#episodeBox')?.querySelector('.ep'); if (!firstEp) $('#closeDetail')?.focus(); }, 50);
  } catch(e) {
    $('#detailPanel').innerHTML = `<button class="focusable" onclick="window.__fyClose()">返回</button><div class="empty">详情加载失败：${esc(e.message)}</div>`;
  }
}
function closeDetail() {
  document.body.classList.remove('detail-active');
  $('#detailSheet').classList.remove('active');
  if (location.hash.startsWith('#detail')) history.back();
  if (lastFocus && lastFocus.focus) setTimeout(() => lastFocus.focus({ preventScroll: true }), 50);
}
window.__fyClose = closeDetail;
function restoreFocus() {
  setTimeout(() => { let el = document.querySelector('.tab.active') || document.querySelector('.card'); if (el) el.focus({ preventScroll: true }); }, 30);
}
function handleKeys(e) {
  if (e.key === 'Escape' || e.key === 'Backspace') {
    if ($('#detailSheet').classList.contains('active')) { e.preventDefault(); closeDetail(); return; }
  }
  if (e.key === 'Enter' && document.activeElement && document.activeElement.classList.contains('focusable') && document.activeElement.tagName !== 'INPUT') {
    document.activeElement.click();
  }
}
function boot() {
  statusEl.textContent = '正在初始化…';
  renderTabs(BASE + '/');
  $('#searchForm').onsubmit = e => { e.preventDefault(); search($('#kw').value); };
  document.addEventListener('keydown', handleKeys, true);
  window.addEventListener('popstate', () => {
    if ($('#detailSheet').classList.contains('active')) closeDetail();
    else loadPage(currentUrl);
  });
  loadPage(BASE + '/');
}
setTimeout(() => { try { if (statusEl && statusEl.textContent === '准备加载…') statusEl.textContent = '正在初始化 WebHome…'; } catch(e) {} }, 800);
waitFm().then(() => { try { boot(); } catch(e) { statusEl.textContent = '启动失败：' + e.message; } }).catch(() => boot());
})();
</script>
